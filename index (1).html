<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS — Personal AI Operating System</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:'Syne',sans-serif;background:#020408}
:root{
  --bg0:#020408;--bg1:#080d14;--bg2:#0d1520;--bg3:#121c2a;--bg4:#1a2535;
  --border:#1e2d40;--border2:#2a3d56;
  --accent:#00c8ff;--accent2:#0088ff;--accent3:#7c3aed;
  --text1:#e8f4ff;--text2:#8ca8c5;--text3:#4a6580;
  --green:#00e5a0;--red:#ff4d6d;--amber:#ffb547;--purple:#a78bfa;
  --mono:'JetBrains Mono',monospace;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.app{display:flex;height:100%;background:var(--bg0);color:var(--text1);overflow:hidden;position:relative}
.sidebar{width:64px;min-width:64px;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;z-index:10;transition:width 0.3s}
.sidebar.expanded{width:220px;align-items:flex-start;padding:12px 8px}
.logo{display:flex;align-items:center;gap:8px;padding:8px 12px;margin-bottom:8px;cursor:pointer;width:100%}
.logo-icon{width:36px;height:36px;min-width:36px;background:linear-gradient(135deg,var(--accent2),var(--accent3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;letter-spacing:-0.5px;color:#fff}
.logo-text{font-size:18px;font-weight:800;letter-spacing:2px;color:var(--accent);white-space:nowrap;overflow:hidden}
.nav-item{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;transition:all 0.2s;color:var(--text2);font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;border:1px solid transparent}
.nav-item svg{min-width:20px}
.nav-item:hover{background:var(--bg3);color:var(--text1)}
.nav-item.active{background:linear-gradient(135deg,rgba(0,136,255,0.15),rgba(124,58,237,0.1));color:var(--accent);border-color:rgba(0,136,255,0.2)}
.nav-label{opacity:0;transition:opacity 0.2s;font-size:12px}
.sidebar.expanded .nav-label{opacity:1}
.sidebar.expanded .nav-item{padding:10px 12px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;min-height:52px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;position:relative}
.model-badge{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:12px;color:var(--text2);transition:all 0.2s}
.model-badge:hover{border-color:var(--accent2);color:var(--accent)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-family:'Syne',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s}
.btn:hover{background:var(--bg3);color:var(--text1)}
.btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent3));border:none;color:#fff}
.btn-primary:hover{opacity:0.9}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:12px;max-width:820px;width:100%}
.msg.user{flex-direction:row-reverse;margin-left:auto}
.msg-avatar{width:32px;height:32px;min-width:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.msg-avatar.ai{background:linear-gradient(135deg,var(--accent2),var(--accent3));color:#fff}
.msg-avatar.user{background:var(--bg4);color:var(--text2)}
.msg-body{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;font-size:14px;line-height:1.7;color:var(--text1);word-break:break-word}
.msg.user .msg-body{background:linear-gradient(135deg,rgba(0,136,255,0.12),rgba(124,58,237,0.08));border-color:rgba(0,136,255,0.2)}
.msg-body pre{background:var(--bg0);border:1px solid var(--border);border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto;font-family:var(--mono);font-size:12px;line-height:1.6}
.msg-body code{font-family:var(--mono);font-size:12px;background:var(--bg0);padding:1px 5px;border-radius:4px;color:var(--accent)}
.msg-body p{margin-bottom:8px}
.msg-body p:last-child{margin-bottom:0}
.msg-body ul,ol{margin:6px 0 6px 20px}
.msg-body li{margin-bottom:4px}
.input-area{padding:16px;border-top:1px solid var(--border);background:var(--bg1)}
.input-wrap{display:flex;align-items:flex-end;gap:10px;background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:10px 12px;transition:border-color 0.2s}
.input-wrap:focus-within{border-color:rgba(0,136,255,0.4)}
.input-wrap textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text1);font-family:'Syne',sans-serif;font-size:14px;resize:none;min-height:20px;max-height:120px;line-height:1.5}
.input-wrap textarea::placeholder{color:var(--text3)}
.send-btn{width:36px;height:36px;min-width:36px;border-radius:8px;background:linear-gradient(135deg,var(--accent2),var(--accent3));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity 0.2s}
.send-btn:hover{opacity:0.85}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.typing{display:flex;align-items:center;gap:4px;padding:4px}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--accent2);animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px;text-align:center}
.welcome-logo{width:72px;height:72px;background:linear-gradient(135deg,var(--accent2),var(--accent3));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;letter-spacing:-1px}
.welcome h1{font-size:32px;font-weight:800;letter-spacing:1px;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.welcome p{color:var(--text2);font-size:15px;max-width:480px;line-height:1.6}
.suggestion-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:600px}
.suggestion{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.2s}
.suggestion:hover{border-color:rgba(0,136,255,0.4);color:var(--text1);background:var(--bg3)}
.panel{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.panel-header{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--text3);text-transform:uppercase;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
.card h3{font-size:14px;font-weight:600;color:var(--text1);margin-bottom:12px}
.stat-row{display:flex;gap:12px;flex-wrap:wrap}
.stat{background:var(--bg3);border-radius:10px;padding:14px;flex:1;min-width:90px}
.stat .val{font-size:22px;font-weight:700;color:var(--accent)}
.stat .lbl{font-size:11px;color:var(--text3);margin-top:2px}
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.agent-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.2s;text-align:center}
.agent-card:hover{border-color:rgba(0,136,255,0.3);transform:translateY(-2px)}
.agent-name{font-size:13px;font-weight:600;color:var(--text1);margin-bottom:4px}
.agent-desc{font-size:11px;color:var(--text3)}
.task-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;transition:background 0.15s}
.task-item:hover{background:var(--bg3)}
.task-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all 0.2s;cursor:pointer;flex-shrink:0}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-text{font-size:13px;color:var(--text2);flex:1}
.task-text.done{text-decoration:line-through;color:var(--text3)}
.tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:11px;font-weight:500}
.tag.code{background:rgba(0,136,255,0.1);color:var(--accent2)}
.tag.research{background:rgba(124,58,237,0.1);color:var(--purple)}
.tag.prod{background:rgba(0,229,160,0.1);color:var(--green)}
.memory-item{display:flex;flex-direction:column;gap:4px;padding:12px;background:var(--bg3);border-radius:10px;border-left:3px solid var(--accent2)}
.memory-item .mem-title{font-size:13px;font-weight:600;color:var(--text1)}
.memory-item .mem-body{font-size:12px;color:var(--text2);line-height:1.5}
.memory-item .mem-date{font-size:11px;color:var(--text3)}
.code-editor{background:var(--bg0);border:1px solid var(--border);border-radius:12px;font-family:var(--mono);font-size:12px;color:#a8c7e8;padding:16px;overflow-x:auto;line-height:1.6;max-height:360px;overflow-y:auto;white-space:pre}
.code-kw{color:#c792ea}.code-fn{color:#82aaff}.code-str{color:#c3e88d}.code-cm{color:#546e7a}
.model-dropdown{position:absolute;top:52px;left:72px;z-index:100;min-width:280px;background:var(--bg1);border:1px solid var(--border2);border-radius:14px;padding:16px;box-shadow:0 16px 48px rgba(0,0,0,0.6)}
.model-opt{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;margin-bottom:6px}
.model-opt:last-child{margin-bottom:0}
.model-opt.selected{border-color:rgba(0,136,255,0.4);background:rgba(0,136,255,0.06)}
.model-opt:hover{background:var(--bg3)}
.model-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--bg3)}
.model-info .name{font-size:13px;font-weight:600;color:var(--text1)}
.model-info .desc{font-size:11px;color:var(--text3)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:0.5px}
.badge.live{background:rgba(0,229,160,0.12);color:var(--green)}
.badge.new{background:rgba(0,136,255,0.12);color:var(--accent2);margin-left:6px}
.onboarding{position:fixed;inset:0;background:rgba(2,4,8,0.97);z-index:200;display:flex;align-items:center;justify-content:center}
.onboard-card{background:var(--bg1);border:1px solid var(--border2);border-radius:20px;padding:40px;max-width:500px;width:90%;display:flex;flex-direction:column;gap:20px}
.onboard-title{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.onboard-q{font-size:15px;color:var(--text1);font-weight:500}
.onboard-input{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;color:var(--text1);font-family:'Syne',sans-serif;font-size:14px;outline:none;width:100%}
.onboard-input:focus{border-color:rgba(0,136,255,0.4)}
.chip-wrap{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 14px;border-radius:20px;border:1px solid var(--border2);font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.2s;background:var(--bg2)}
.chip.sel{background:rgba(0,136,255,0.12);border-color:rgba(0,136,255,0.4);color:var(--accent2)}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:4px}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--accent3));transition:width 0.4s}
.split{display:flex;flex:1;overflow:hidden}
.code-panel{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;min-width:0}
.preview-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.code-toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg1);flex-wrap:wrap}
.file-tab{padding:5px 12px;background:var(--bg0);border-radius:6px;font-size:11px;font-family:var(--mono);color:var(--text2);cursor:pointer;border:1px solid transparent}
.file-tab.active{border-color:var(--accent2);color:var(--accent2)}
.voice-ring{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent3));display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:all 0.3s;position:relative}
.voice-ring.listening{animation:voicePulse 1s infinite}
@keyframes voicePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.quick-btn{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--text2);cursor:pointer;transition:all 0.2s;font-family:'Syne',sans-serif}
.quick-btn:hover{background:var(--bg3);color:var(--text1)}
.api-key-banner{background:rgba(255,181,71,0.08);border:1px solid rgba(255,181,71,0.25);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--amber);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.api-key-input{background:var(--bg0);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text1);font-family:var(--mono);font-size:12px;outline:none;flex:1;min-width:180px}
.api-key-input:focus{border-color:rgba(0,136,255,0.4)}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,createContext,useContext}=React;

// ─── API KEY CONTEXT ───────────────────────────────────────────────────────

// ─── HELPERS ───────────────────────────────────────────────────────────────
function SvgIcon({type,size=20}){
  const s={width:size,height:size,fill:'none',stroke:'currentColor',strokeWidth:'1.5',strokeLinecap:'round',strokeLinejoin:'round',display:'block'};
  const p={
    chat:<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
    dashboard:<><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>,

    tasks:<><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></>,
    voice:<><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></>,
    settings:<><circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></>,
    menu:<><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>,
    send:<><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
    mic:<><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></>,

    key:<><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></>,

  return <svg viewBox="0 0 24 24" {...s}>{p[type]||null}</svg>;

function MarkdownText({text}){
  const rendered=text
    .replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>`<pre><code>${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^### (.*$)/gm,'<h3 style="font-size:14px;font-weight:700;margin:12px 0 6px;color:#0088ff">$1</h3>')
    .replace(/^## (.*$)/gm,'<h2 style="font-size:15px;font-weight:700;margin:14px 0 6px">$1</h2>')
    .replace(/^# (.*$)/gm,'<h1 style="font-size:17px;font-weight:800;margin:14px 0 8px">$1</h1>')
    .replace(/^- (.*$)/gm,'<li style="margin-left:16px;margin-bottom:4px">$1</li>')
    .replace(/^\d+\. (.*$)/gm,'<li style="margin-left:16px;margin-bottom:4px;list-style-type:decimal">$1</li>')
    .replace(/\n/g,'<br>');
  return <div className="msg-body" dangerouslySetInnerHTML={{__html:rendered}}/>;
}

async function callClaude(messages,system,apiKey){
  if(!apiKey) throw new Error('NO_KEY');
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system,messages})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`);}
  const data=await res.json();
  return data.content?.map(b=>b.text||'').join('')||'No response.';
}

// ─── ONBOARDING ────────────────────────────────────────────────────────────
function OnboardingFlow({onComplete}){
  const [step,setStep]=useState(0);
  const [data,setData]=useState({});
  const [input,setInput]=useState('');
  const [chips,setChips]=useState([]);
  const cur=ONBOARD_STEPS[step];
  const pct=((step+1)/ONBOARD_STEPS.length*100).toFixed(0);

  const next=()=>{
    const upd={...data,[cur.key]:cur.type==='text'?input:chips};
    setData(upd);
    if(step<ONBOARD_STEPS.length-1){setStep(s=>s+1);setInput('');setChips([]);}
    else onComplete(upd);
  };

  const toggleChip=c=>{
    const single=cur.key==='coding'||cur.key==='style';
    setChips(cs=>single?[c]:cs.includes(c)?cs.filter(x=>x!==c):[...cs,c]);
  };

  const canNext=cur.type==='text'?input.trim().length>0:chips.length>0;

  return(
    <div className="onboarding">
      <div className="onboard-card">
        <div>
          <div className="progress-bar"><div className="progress-fill" style={{width:pct+'%'}}/></div>
          <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'4px',textAlign:'right'}}>{step+1} / {ONBOARD_STEPS.length}</div>
        </div>
        <div style={{width:52,height:52,background:'linear-gradient(135deg,var(--accent2),var(--accent3))',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:18,color:'#fff'}}>AT</div>
        <div className="onboard-title">Welcome to ATLAS</div>
        <div className="onboard-q">{cur.q}</div>
        {cur.type==='text'&&<input className="onboard-input" value={input} onChange={e=>setInput(e.target.value)} placeholder={cur.ph} onKeyDown={e=>e.key==='Enter'&&canNext&&next()} autoFocus/>}
        {cur.type==='chips'&&<div className="chip-wrap">{cur.opts.map(c=><div key={c} className={`chip${chips.includes(c)?' sel':''}`} onClick={()=>toggleChip(c)}>{c}</div>)}</div>}
        <button className="btn btn-primary" onClick={next} disabled={!canNext} style={{alignSelf:'flex-end',padding:'10px 24px',fontSize:'14px'}}>
          {step===ONBOARD_STEPS.length-1?'Launch ATLAS →':'Continue →'}
        </button>
      </div>
    </div>
  );
}

        </div>

        <div className="welcome">
          <div className="welcome-logo">AT</div>
          <h1>ATLAS AI OS</h1>

        </div>

        <div className="chat-area">
          {msgs.map((m,i)=>(
            <div key={i} className={`msg${m.role==='user'?' user':''}`}>
              <div className={`msg-avatar${m.role==='assistant'?' ai':' user'}`}>{m.role==='assistant'?'AT':'ME'}</div>

            </div>

          {loading&&<div className="msg"><div className="msg-avatar ai">AT</div><div className="msg-body"><div className="typing"><span/><span/><span/></div></div></div>}
          {error&&<div style={{background:'rgba(255,77,109,0.08)',border:'1px solid rgba(255,77,109,0.25)',borderRadius:10,padding:'10px 14px',fontSize:13,color:'var(--red)'}}>{error}</div>}

                  <div key={t} className="suggestion" style={{fontSize:12,padding:'6px 12px'}} onClick={()=>{setPrompt('Build a '+t);}}>{t}</div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MEMORY ────────────────────────────────────────────────────────────────

    {title:'Communication Style',body:`Prefers ${profile?.style?.[0]||'detailed and helpful'} responses. Engages well with examples and practical explanations.`,date:'Onboarding',tag:'style'},

    {title:'Learning Path',body:'Interested in machine learning and AI. Started with Python ML libraries.',date:'Session 2',tag:'learning'},

      </div>
      <div style={{fontSize:12,color:'var(--text3)'}}>ATLAS remembers your preferences, goals, and conversations to personalize every interaction.</div>
      {filtered.map((m,i)=>(

            <span className={`tag ${m.tag==='code'?'code':m.tag==='project'?'research':'prod'}`}>{m.tag}</span>

          <div className="mem-date">{m.date}</div>
        </div>

// ─── VOICE ─────────────────────────────────────────────────────────────────
function VoiceView(){
  const apiKey=useContext(ApiKeyContext);
  const [listening,setListening]=useState(false);
  const [transcript,setTranscript]=useState('');
  const [response,setResponse]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const recRef=useRef(null);

  const toggle=()=>{
    if(listening){recRef.current?.stop();setListening(false);return;}
    if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){setError('Voice input requires Chrome browser.');return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recRef.current=new SR();
    recRef.current.continuous=false;recRef.current.interimResults=true;
    recRef.current.onresult=e=>setTranscript(Array.from(e.results).map(r=>r[0].transcript).join(''));
    recRef.current.onend=async()=>{
      setListening(false);
      const t=transcript.trim();if(!t)return;
      setLoading(true);setError('');
      try{
        const reply=await callClaude([{role:'user',content:t}],'You are ATLAS voice assistant. Be concise and conversational.',apiKey);
        setResponse(reply);
        if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(reply.replace(/[#*`_]/g,'').substring(0,500));u.rate=1;window.speechSynthesis.speak(u);}
      }catch(e){setError(e.message==='NO_KEY'?'Add API key in Settings.':'Error: '+e.message);}
      setLoading(false);
    };
    recRef.current.start();setListening(true);setTranscript('');setResponse('');
  };

  return(
    <div className="panel" style={{alignItems:'center',textAlign:'center'}}>
      <div className="panel-header" style={{alignSelf:'stretch'}}>Voice Interaction</div>
      <div style={{padding:'32px 0 16px'}}>
        <div style={{fontSize:48,marginBottom:16}}>🎙️</div>
        <div style={{fontSize:20,fontWeight:700,marginBottom:8}}>Voice Assistant</div>
        <div style={{fontSize:13,color:'var(--text3)',marginBottom:32}}>Speak naturally — ATLAS will respond with voice</div>
        <button className={`voice-ring${listening?' listening':''}`} onClick={toggle}>
          <SvgIcon type={listening?'send':'mic'} size={24}/>
        </button>
        <div style={{marginTop:16,fontSize:13,color:listening?'var(--accent)':'var(--text3)'}}>{listening?'Listening... tap to process':'Tap to speak'}</div>
      </div>
      {transcript&&<div className="card" style={{width:'100%',textAlign:'left'}}><h3>You said:</h3><p style={{fontSize:14,color:'var(--text2)',fontStyle:'italic',marginTop:4}}>"{transcript}"</p></div>}
      {loading&&<div className="msg" style={{width:'100%'}}><div className="msg-avatar ai">AT</div><div className="msg-body"><div className="typing"><span/><span/><span/></div></div></div>}
      {error&&<div style={{background:'rgba(255,77,109,0.08)',border:'1px solid rgba(255,77,109,0.2)',borderRadius:10,padding:'10px 14px',fontSize:13,color:'var(--red)',width:'100%'}}>{error}</div>}
      {response&&<div style={{width:'100%',textAlign:'left'}}><MarkdownText text={response}/></div>}
      <div className="card" style={{width:'100%',textAlign:'left',marginTop:8}}>
        <h3>💡 Try saying...</h3>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginTop:4}}>
          {['"What can you help me with?"','"Generate a React component"','"Give me 3 startup ideas"','"Explain async/await"'].map(p=><span key={p} style={{fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>{p}</span>)}
        </div>
      </div>
    </div>
  );
}

// ─── SETTINGS ──────────────────────────────────────────────────────────────

  const [keyVal,setKeyVal]=useState(apiKey||'');
  const [saved,setSaved]=useState(false);
  const save=()=>{const k=keyVal.trim();setApiKey(k);localStorage.setItem('atlas_api_key',k);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const [accent,setAccent]=useState('#0088ff');

  return(
    <div className="panel">
      <div className="panel-header">Settings</div>
      <div className="card">
        <h3>👤 Your Profile</h3>
        <div style={{display:'flex',gap:12,alignItems:'center',marginBottom:16}}>
          <div style={{width:52,height:52,borderRadius:14,background:'linear-gradient(135deg,var(--accent2),var(--accent3))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,fontWeight:800,color:'#fff'}}>{(profile?.name||'U')[0].toUpperCase()}</div>
          <div><div style={{fontSize:16,fontWeight:600}}>{profile?.name||'User'}</div><div style={{fontSize:12,color:'var(--text3)'}}>ATLAS Personal OS</div></div>
        </div>
        {[['Goals',profile?.goals?.join(', ')||'—'],['Coding Level',profile?.coding?.[0]||'—'],['Style',profile?.style?.[0]||'—'],['Fav Tech',profile?.tech?.join(', ')||'—']].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:13,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{color:'var(--text3)'}}>{k}</span><span style={{color:'var(--text2)'}}>{v}</span>
          </div>
        ))}
      </div>
      <div className="card">
        <h3>🔑 Anthropic API Key</h3>
        <div style={{fontSize:12,color:'var(--text3)',marginBottom:12,lineHeight:1.6}}>Your API key is stored locally in your browser only. It never leaves your device except for direct calls to Anthropic's API.<br/><a href="https://console.anthropic.com/keys" target="_blank" rel="noreferrer" style={{color:'var(--accent2)'}}>Get your API key →</a></div>
        <div style={{display:'flex',gap:8}}>
          <input type="password" className="api-key-input" value={keyVal} onChange={e=>setKeyVal(e.target.value)} placeholder="sk-ant-..." style={{flex:1}}/>
          <button className="btn btn-primary" onClick={save} style={{flex:'none'}}>{saved?'✓ Saved':'Save Key'}</button>
        </div>
        {apiKey&&<div style={{marginTop:8,fontSize:11,color:'var(--green)'}}>✓ API key is configured — AI features active</div>}
      </div>
      <div className="card">
        <h3>🎨 Accent Color</h3>
        <div style={{display:'flex',gap:10,marginTop:4,flexWrap:'wrap'}}>
          {['#0088ff','#7c3aed','#00e5a0','#ffb547','#ff4d6d','#00c8ff','#f59e0b','#10b981'].map(c=>(
            <div key={c} onClick={()=>setAccent(c)} style={{width:28,height:28,borderRadius:8,background:c,cursor:'pointer',border:accent===c?'2px solid white':'2px solid transparent',transition:'border 0.15s'}}/>
          ))}
        </div>
      </div>
      <div className="card">
        <h3>⚙️ System Preferences</h3>
        {[{l:'Streaming responses',v:true},{l:'Voice responses (TTS)',v:false},{l:'Auto-save drafts',v:true},{l:'Keyboard shortcuts',v:true},{l:'Compact message view',v:false}].map(({l,v},i)=>(
          <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontSize:13,color:'var(--text2)'}}>{l}</span>
            <div style={{width:36,height:20,borderRadius:10,background:v?'var(--accent2)':'var(--border)',position:'relative',cursor:'pointer'}}>
              <div style={{position:'absolute',top:3,left:v?19:3,width:14,height:14,borderRadius:'50%',background:'white',transition:'left 0.2s'}}/>
            </div>
          </div>
        ))}
      </div>
      <div className="card">
        <h3>📦 About ATLAS</h3>
        <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.7}}>
          ATLAS AI OS — Version 1.0.0<br/>
          Personal AI Operating System<br/>
          Built with React · Powered by Claude Sonnet 4.6<br/>
          <span style={{color:'var(--text3)'}}>© 2025 — Your personal AI workspace</span>
        </div>
      </div>
    </div>
  );
}

// ─── NAV CONFIG ────────────────────────────────────────────────────────────
const NAV=[
  {id:'chat',icon:'chat',label:'Chat'},
  {id:'dashboard',icon:'dashboard',label:'Dashboard'},
  {id:'agents',icon:'agents',label:'Agents'},
  {id:'code',icon:'code',label:'Code'},
  {id:'memory',icon:'memory',label:'Memory'},
  {id:'voice',icon:'voice',label:'Voice'},
  {id:'settings',icon:'settings',label:'Settings'},
];

// ─── ROOT APP ──────────────────────────────────────────────────────────────
function App(){
  const [onboarded,setOnboarded]=useState(()=>!!localStorage.getItem('atlas_profile'));
  const [profile,setProfile]=useState(()=>{try{return JSON.parse(localStorage.getItem('atlas_profile'));}catch{return null;}});
  const [view,setView]=useState('chat');
  const [expanded,setExpanded]=useState(false);
  const [model,setModel]=useState('claude');
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('atlas_api_key')||'');

  const complete=data=>{
    setProfile(data);
    localStorage.setItem('atlas_profile',JSON.stringify(data));
    setOnboarded(true);
  };

  const viewTitles={dashboard:'📊 Dashboard',memory:'🧠 Memory',voice:'🎙️ Voice',settings:'⚙️ Settings'};

  return(
    <ApiKeyContext.Provider value={apiKey}>
      <div className="app">
        {!onboarded&&<OnboardingFlow onComplete={complete}/>}
        <div className={`sidebar${expanded?' expanded':''}`}>
          <div className="logo" onClick={()=>setExpanded(!expanded)}>
            <div className="logo-icon">AT</div>
            {expanded&&<div className="logo-text">ATLAS</div>}
          </div>
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item${view===n.id?' active':''}`} onClick={()=>setView(n.id)} title={n.label}>
              <SvgIcon type={n.icon} size={20}/>
              <span className="nav-label">{n.label}</span>
            </div>
          ))}
          <div style={{marginTop:'auto'}}>
            <div className="nav-item" onClick={()=>setExpanded(!expanded)} title="Toggle Sidebar">
              <SvgIcon type="menu" size={20}/>
              {expanded&&<span className="nav-label">Collapse</span>}
            </div>
          </div>
        </div>
        <div className="main">
          {!apiKey&&view!=='settings'&&(
            <div style={{padding:'8px 16px',background:'var(--bg1)',borderBottom:'1px solid var(--border)'}}>
              <ApiKeyBanner apiKey={apiKey} setApiKey={setApiKey}/>
            </div>
          )}
          {view==='chat'&&<ChatView profile={profile} model={model} setModel={setModel}/>}
          {['dashboard','memory','voice','settings'].includes(view)&&(
            <>
              <div className="topbar"><span style={{fontSize:13,fontWeight:600}}>{viewTitles[view]}</span></div>
              <div style={{flex:1,overflow:'auto'}}>
                {view==='dashboard'&&<Dashboard profile={profile}/>}
                {view==='memory'&&<MemoryView profile={profile}/>}
                {view==='voice'&&<VoiceView/>}
                {view==='settings'&&<SettingsView profile={profile} apiKey={apiKey} setApiKey={setApiKey}/>}
              </div>
            </>
          )}
          {view==='agents'&&<AgentsView profile={profile}/>}
          {view==='code'&&<CodeView/>}
        </div>
      </div>
    </ApiKeyContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
